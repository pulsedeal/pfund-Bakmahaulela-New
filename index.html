<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PFUND LISSA GAHA GAME</title>

<style>
body { font-family: sans-serif; background:#140810; color:white; text-align:center; }
button { padding:10px; margin:5px; width:100%; }
.opt { background:#222; border:1px solid #555; }
.opt.ok { background:green; }
.opt.no { background:red; }
canvas { background:#1a0d12; margin:10px auto; display:block; }
</style>
</head>

<body>

<h2>🎊 ලිස්සන ගහ Game</h2>

<div id="start">
<input id="name" placeholder="ඔබේ නම"><br><br>
<button onclick="startGame()">Start</button>
</div>

<div id="game" style="display:none;">
<p id="q"></p>
<p id="score"></p>
<canvas id="cv" width="80" height="300"></canvas>
<div id="opts"></div>
<button onclick="nextQ()" id="next" style="display:none;">Next</button>
</div>

<div id="end" style="display:none;">
<h2 id="final"></h2>
<button onclick="location.reload()">Restart</button>
</div>

<script>
const TOTAL_Q = 10;

const QS = [
{q:"1+1=?",o:["1","2","3"],a:1},
{q:"2+2=?",o:["2","4","5"],a:1},
{q:"3+3=?",o:["6","7","8"],a:0},
{q:"4+4=?",o:["6","8","9"],a:1},
{q:"5+5=?",o:["10","11","12"],a:0},
{q:"6+6=?",o:["11","12","13"],a:1},
{q:"7+7=?",o:["14","15","16"],a:0},
{q:"8+8=?",o:["15","16","17"],a:1},
{q:"9+9=?",o:["18","19","20"],a:0},
{q:"10+10=?",o:["19","20","21"],a:1}
];

let G = {qi:0, score:0, pos:0};

function startGame(){
  document.getElementById('start').style.display='none';
  document.getElementById('game').style.display='block';
  renderQ();
}

function renderQ(){
  let q = QS[G.qi];
  document.getElementById('q').textContent = q.q;
  document.getElementById('score').textContent = "Score: "+G.score;

  let opts = document.getElementById('opts');
  opts.innerHTML='';

  q.o.forEach((o,i)=>{
    let b = document.createElement('button');
    b.className='opt';
    b.textContent=o;
    b.onclick=()=>answer(i);
    opts.appendChild(b);
  });

  draw();
}

function answer(i){
  let correct = i===QS[G.qi].a;

  if(correct){
    G.score++;
    animateMove(G.pos+1);
  } else {
    animateMove(Math.max(0,G.pos-1));
  }

  document.querySelectorAll('.opt').forEach((b,idx)=>{
    b.disabled=true;
    if(idx===QS[G.qi].a) b.classList.add('ok');
    else if(idx===i) b.classList.add('no');
  });

  document.getElementById('next').style.display='block';
}

function nextQ(){
  G.qi++;
  document.getElementById('next').style.display='none';

  if(G.qi>=TOTAL_Q){
    document.getElementById('game').style.display='none';
    document.getElementById('end').style.display='block';
    document.getElementById('final').textContent="Final Score: "+G.score;
  } else renderQ();
}

function animateMove(target){
  let start = G.pos;
  let diff = target-start;
  let step = 0;

  function anim(){
    step += 0.1;
    if(step>=1){
      G.pos = target;
      draw();
      return;
    }
    G.pos = start + diff*step;
    draw();
    requestAnimationFrame(anim);
  }

  anim();
}

function draw(){
  let c = document.getElementById('cv');
  let ctx = c.getContext('2d');
  ctx.clearRect(0,0,80,300);

  // pole
  ctx.fillStyle="brown";
  ctx.fillRect(35,20,10,260);

  let stepH = 260/TOTAL_Q;
  let y = 280 - (G.pos*stepH);

  ctx.fillStyle="yellow";

  // head
  ctx.beginPath();
  ctx.arc(40,y,5,0,Math.PI*2);
  ctx.fill();

  // body
  ctx.fillRect(38,y+5,4,10);

  // arms
  ctx.beginPath();
  ctx.moveTo(38,y+8);
  ctx.lineTo(30,y+12);
  ctx.moveTo(42,y+8);
  ctx.lineTo(50,y+12);
  ctx.strokeStyle="yellow";
  ctx.stroke();

  // legs
  ctx.beginPath();
  ctx.moveTo(38,y+15);
  ctx.lineTo(32,y+22);
  ctx.moveTo(42,y+15);
  ctx.lineTo(48,y+22);
  ctx.stroke();
}
</script>

</body>
</html>
